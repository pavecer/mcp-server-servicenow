kind: AdaptiveDialog
modelDescription: |-
  You will help users request ServiceNow catalog items by searching items, collecting required details, and placing an order.

  You must only place orders after explicit user confirmation.

  Example valid requests:
  "I need a new laptop"
  "Order a monitor in ServiceNow"
  "Help me request software"

  Example invalid requests:
  "Order something without telling me what"
  "Submit random data"
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - I need to request something in ServiceNow
      - Help me order a catalog item
      - I want to request hardware or software
      - Start ServiceNow order

  actions:
    - kind: SendActivity
      id: intro_msg
      activity: I can help you place a ServiceNow catalog order. Tell me what you want to request.

    - kind: Question
      id: ask_request
      variable: Topic.UserRequest
      prompt: What item would you like to request?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items: []
      alwaysPrompt: true

    - kind: BeginDialog
      id: call_search
      displayName: Search ServiceNow Catalog Items
      input:
        binding:
          query: =Topic.UserRequest
          limit: =10
      dialog: tools.searchCatalogItems
      output:
        binding:
          resultJson: Topic.SearchResultJson
          error: Topic.SearchError

    - kind: ConditionGroup
      id: search_status
      conditions:
        - id: search_failed
          condition: =Not(IsBlank(Topic.SearchError))
          actions:
            - kind: SendActivity
              id: search_failed_msg
              activity: I could not search the ServiceNow catalog right now. Please try again.
            - kind: EndDialog
              id: end_search_failed

    - kind: SendActivity
      id: search_ok
      activity: I found matching catalog items. Please select one in the ordering flow.

    - kind: EndDialog
      id: end_success

inputType:
  properties: {}

outputType:
  properties:
    SearchResultJson:
      displayName: SearchResultJson
      type: String
    SearchError:
      displayName: SearchError
      type: String
    UserRequest:
      displayName: UserRequest
      type: String
